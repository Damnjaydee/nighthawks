<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Member Access — Nighthawks</title>
  <meta name="theme-color" content="#0b0b0b" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="assets/logo-white.jpg" />
  <link rel="preload" as="image" href="assets/nyc-penthouse-skyline.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#0b0b0b;
      --ink:#f5f3ee;
      --muted:rgba(245,243,238,.58);
      --line:rgba(255,255,255,.10);
      --ring:rgba(255,255,255,.9);
      --gold:rgba(200,178,122,.9);
      --serif:"Cormorant Garamond",ui-serif,Georgia,serif;
      --sans:Inter,system-ui,-apple-system,sans-serif;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:var(--bg);color:var(--ink);
      font-family:var(--sans);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    a{color:inherit;text-decoration:none}
    :where(a,button,input):focus-visible{
      outline:2px solid var(--ring);
      outline-offset:2px;border-radius:10px;
    }

    /* ── LAYOUT ── */
    .page{
      min-height:100vh;
      display:grid;
      grid-template-columns:1.2fr .8fr;
    }
    @media(max-width:900px){
      .page{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
    }

    /* ── LEFT: SKYLINE ── */
    .visual{
      position:relative;
      overflow:hidden;
      background:
        url("assets/nyc-penthouse-skyline.jpg") center 58%/cover no-repeat;
      min-height:100vh;
    }
    .visual::after{
      content:"";position:absolute;inset:0;
      background:
        linear-gradient(to right, rgba(0,0,0,.08), rgba(0,0,0,.28)),
        linear-gradient(to bottom, rgba(0,0,0,.08), rgba(0,0,0,.18));
      pointer-events:none;
    }
    .brand-home{
      position:absolute;top:22px;left:22px;z-index:3;
      display:flex;align-items:center;gap:10px;
    }
    .brand-home img{
      height:26px;width:auto;border-radius:4px;
      filter:drop-shadow(0 2px 10px rgba(0,0,0,.5));
    }
    .brand-home span{
      font-family:var(--serif);font-weight:600;
      font-size:15px;letter-spacing:.10em;
      text-transform:uppercase;
      color:rgba(245,243,238,.88);
      text-shadow:0 1px 8px rgba(0,0,0,.5);
    }

    @media(max-width:900px){
      .visual{
        min-height:42vh;
        grid-row:1;
      }
      .brand-home span{display:none}
    }

    /* ── RIGHT: PANEL ── */
    .panel{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 24px;
      background:var(--bg);
      overflow:hidden;
    }
    .panel::before{
      content:"";position:absolute;inset:0;
      background:radial-gradient(800px 500px at 50% 20%, rgba(200,178,122,.06), transparent 60%);
      pointer-events:none;
    }

    /* ── CARD ── */
    .card{
      position:relative;z-index:2;
      width:100%;max-width:420px;
      padding:44px 40px;
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(0,0,0,.32);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:0 24px 80px rgba(0,0,0,.5);
    }

    .card-brand{
      display:flex;align-items:center;justify-content:center;gap:8px;
      margin:0 0 28px;
    }
    .card-brand img{height:20px;width:auto;opacity:.85;}
    .card-brand span{
      font-family:var(--serif);font-weight:600;
      font-size:14px;letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(245,243,238,.72);
    }

    .card-eye{
      font-size:10px;letter-spacing:.28em;
      text-transform:uppercase;
      color:rgba(245,243,238,.36);
      margin:0 0 12px;
      text-align:center;
    }

    .card-h1{
      font-family:var(--serif);
      font-size:clamp(30px,3vw,40px);
      font-weight:600;line-height:1.02;
      letter-spacing:-.01em;
      margin:0 0 32px;
      text-align:center;
    }
    .card-h1 em{
      font-style:italic;font-weight:500;
      color:rgba(245,243,238,.45);
    }

    /* FORM */
    .field{display:grid;gap:8px;margin:0 0 20px;}
    .field label{
      font-size:11px;letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(245,243,238,.38);
    }
    .field input{
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px 16px;
      color:var(--ink);
      font:400 14px/1 var(--sans);
      outline:none;width:100%;
      transition:border-color .15s,box-shadow .15s;
      height:48px;
    }
    .field input::placeholder{color:rgba(245,243,238,.2)}
    .field input:focus{
      border-color:rgba(245,243,238,.32);
      box-shadow:0 0 0 3px rgba(245,243,238,.05);
    }
    .field input.invalid{
      border-color:rgba(255,107,107,.6);
    }
    .field-hint{
      font-size:11px;color:rgba(245,243,238,.28);
      line-height:1.6;
    }
    .field-error{
      font-size:11px;color:#ff6b6b;
      display:none;
    }

    /* SUBMIT */
    .submit-btn{
      width:100%;height:48px;
      background:#f5f3ee;color:#0b0b0b;
      border:none;border-radius:999px;
      font:600 11px/1 var(--sans);
      letter-spacing:.09em;text-transform:uppercase;
      cursor:pointer;
      margin:4px 0 20px;
      transition:filter .15s;
    }
    .submit-btn:hover{filter:brightness(.93)}
    .submit-btn:disabled{opacity:.45;cursor:not-allowed}

    /* LINKS */
    .card-links{
      display:flex;align-items:center;
      justify-content:space-between;
      margin:0 0 24px;
    }
    .card-links a{
      font-size:11px;letter-spacing:.04em;
      color:rgba(245,243,238,.36);
      transition:color .15s;
    }
    .card-links a:hover{color:rgba(245,243,238,.75)}

    .card-fine{
      font-size:10px;letter-spacing:.03em;
      color:rgba(245,243,238,.22);
      text-align:center;line-height:1.7;
      border-top:1px solid var(--line);
      padding-top:20px;
    }
    .card-fine a{
      color:rgba(245,243,238,.38);
      text-decoration:underline;
      text-underline-offset:2px;
    }
    .card-fine a:hover{color:rgba(245,243,238,.7)}

    @media(max-width:900px){
      .card{padding:36px 28px;max-width:480px;}
    }
    @media(max-width:480px){
      .card{padding:28px 20px;}
    }
  </style>
</head>

<body>
  <main class="page">

    <!-- LEFT: SKYLINE -->
    <aside class="visual" aria-label="NYC penthouse skyline">
      <a class="brand-home" href="index.html" aria-label="Nighthawks home">
        <img src="assets/logo-white.jpg" alt="Nighthawks" />
        <span>Nighthawks</span>
      </a>
    </aside>

    <!-- RIGHT: LOGIN -->
    <section class="panel">
      <div class="card">

        <div class="card-brand">
          <img src="assets/logo-white.jpg" alt="Nighthawks" />
          <span>Nighthawks</span>
        </div>

        <p class="card-eye">Member Access</p>
        <h1 class="card-h1">Private<br/><em>Portal.</em></h1>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">Email Address</label>
            <input
              id="email"
              name="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="you@domain.com"
              required
            />
            <p class="field-error" id="emailError">Please enter a valid email address.</p>
            <p class="field-hint">Use the email associated with your Nighthawks membership.</p>
          </div>

          <div class="field" id="passwordField" style="display:none;">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="••••••••"
            />
            <p class="field-error" id="passwordError">Please enter your password.</p>
          </div>

          <button class="submit-btn" type="submit" id="submitBtn">Continue</button>

          <div class="card-links">
            <a href="forgot.html">Forgot account?</a>
            <a href="membership.html">Request membership</a>
          </div>

          <p class="card-fine">
            By continuing, you agree to our
            <a href="terms.html">Terms</a> and
            <a href="privacy.html">Privacy Policy</a>.
          </p>
        </form>

      </div>
    </section>

  </main>

  <script>
    const form = document.getElementById('loginForm');
    const emailEl = document.getElementById('email');
    const emailErr = document.getElementById('emailError');
    const passwordField = document.getElementById('passwordField');
    const passwordEl = document.getElementById('password');
    const passwordErr = document.getElementById('passwordError');
    const submitBtn = document.getElementById('submitBtn');

    let step = 1;

    function isValidEmail(v){
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v||'');
    }

    function showEmailError(msg){
      emailErr.textContent = msg;
      emailErr.style.display = 'block';
      emailEl.classList.add('invalid');
    }
    function clearEmailError(){
      emailErr.style.display = 'none';
      emailEl.classList.remove('invalid');
    }

    emailEl.addEventListener('input', clearEmailError);

    form.addEventListener('submit', async e => {
      e.preventDefault();

      if(step === 1){
        const email = emailEl.value.trim();
        if(!isValidEmail(email)){
          showEmailError('Please enter a valid email address.');
          emailEl.focus();
          return;
        }
        clearEmailError();
        // Show password field
        passwordField.style.display = 'grid';
        submitBtn.textContent = 'Sign In';
        step = 2;
        passwordEl.focus();
        return;
      }

      if(step === 2){
        const email = emailEl.value.trim();
        const password = passwordEl.value;

        if(!password){
          passwordErr.style.display = 'block';
          passwordEl.focus();
          return;
        }
        passwordErr.style.display = 'none';

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in…';

        try{
          const res = await fetch('/api/auth/login', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email, password })
          });
          const data = await res.json().catch(()=>({}));
          if(res.ok && data.ok !== false){
            window.location.href = data.redirect || 'dashboard.html';
          } else {
            showEmailError(data.error || 'Invalid credentials. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign In';
          }
        } catch {
          showEmailError('Network error. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      }
    });
  </script>
</body>
</html>
