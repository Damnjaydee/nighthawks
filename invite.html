<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Inner Circle — Access</title>
  <link rel="preload" as="image" href="./assets/logo-white.jpg" />
  <link rel="preload" as="image" href="./assets/invite-book.jpg" />

  <style>
    :root{
      --scene-url: url("./assets/invite-book.jpg");
      --ink:#e7e9ed; --muted:#a3a8b0; --bg:#0c0d10; --panel:#0f1115;
      --gold:#c5a264; --gold-600:#b68e48; --line:#232630;
      --fs-12: clamp(11px, 0.8vw, 12px); --fs-14: clamp(13px, 1.0vw, 14px);
      --fs-16: clamp(15px, 1.1vw, 16px); --fs-18: clamp(16px, 1.2vw, 18px);
      --fs-32: clamp(24px, 2.5vw, 32px);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      color:var(--ink); background:var(--bg);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
      font-size:var(--fs-16);
    }
    a{color:inherit;text-decoration:none}
    :where(a,button,input){outline:0}
    :where(a,button,input):focus-visible{
      outline:3px solid rgba(197,162,100,.55); outline-offset:3px; border-radius:10px;
    }

    .scene{
      min-height:100vh; position:relative; overflow:hidden;
      display:grid; place-items:center;
      background:
        radial-gradient(1200px 800px at 70% 20%, rgba(255,255,255,.06) 0%, rgba(255,255,255,0) 60%),
        linear-gradient(120deg, #0b0c10 0%, #0d0f14 40%, #0a0b0e 100%);
    }
    .scene.has-image{
      background-image:var(--scene-url);
      background-size:cover; background-position:center; background-repeat:no-repeat;
    }
    .scene::before{
      content:""; position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(1200px 900px at 25% 15%, rgba(255,255,255,.07) 0%, rgba(255,255,255,0) 60%),
        linear-gradient(0deg, rgba(0,0,0,.58), rgba(0,0,0,.58));
    }
    .vignette{
      position:absolute; inset:0; pointer-events:none;
      box-shadow:inset 0 0 220px rgba(0,0,0,.68);
    }

    .brand{
      position:absolute; top:22px; left:22px; z-index:3; display:inline-block;
    }
    .brand img{
      width:46px; height:auto; display:block;
      filter:drop-shadow(0 2px 10px rgba(0,0,0,.55));
      user-select:none; -webkit-user-drag:none;
    }

    .panel{
      width:min(92vw, 720px); z-index:2;
      background:linear-gradient(180deg, rgba(18,20,27,.85), rgba(16,18,24,.85));
      backdrop-filter:blur(2px);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:clamp(28px, 5vw, 48px);
      box-shadow:0 8px 40px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04);
    }

    .kicker{font-size:var(--fs-12); letter-spacing:.22em; text-transform:uppercase; color:var(--muted);}
    h1{margin:.45rem 0 1.2rem; font-size:var(--fs-32); letter-spacing:.02em; font-weight:700; color:var(--ink);}

    .form-row{margin-top:18px;}
    label{display:block; font-size:var(--fs-14); color:var(--muted); margin:0 0 .5rem;}

    .input-wrap{position:relative; display:flex; gap:12px; align-items:center;}
    .input{
      flex:1 1 auto; height:52px; border-radius:12px; border:1px solid var(--line);
      padding:0 14px; font-size:var(--fs-18); color:var(--ink); background:#0c0f16;
      box-shadow:inset 0 1px 2px rgba(0,0,0,.45);
      transition:border-color .2s, box-shadow .2s; letter-spacing:.10em;
    }
    .input::placeholder{color:#7c8290;}
    .input:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(197,162,100,.2);}
    .input.is-invalid{border-color:#ff6b6b !important; box-shadow:0 0 0 3px rgba(255,107,107,.12) !important;}

    .btn{
      flex:0 0 auto; height:52px; padding:0 20px;
      background:var(--gold); color:#0c0d10; border:0; border-radius:12px;
      font-weight:800; letter-spacing:.08em; text-transform:uppercase;
      cursor:pointer; font-size:var(--fs-14);
      box-shadow:0 8px 20px rgba(197,162,100,.22);
      transition:transform .04s ease, background .2s ease, box-shadow .2s ease, opacity .2s ease;
      white-space:nowrap;
    }
    .btn:hover{background:var(--gold-600); box-shadow:0 10px 24px rgba(197,162,100,.30);}
    .btn:active{transform:translateY(1px);}
    .btn[disabled]{opacity:.65; cursor:not-allowed; transform:none}

    .hint{margin-top:10px; color:var(--muted); font-size:var(--fs-12);}
    .error{margin-top:10px; color:#ff6b6b; font-size:var(--fs-12); display:none;}
    .foot{margin-top:22px; color:var(--muted); font-size:var(--fs-12);}
    .links{margin-top:18px; display:flex; gap:16px; flex-wrap:wrap;}
    .links a{color:#cdd2da;}
    .links a:hover{color:#fff; text-decoration:underline; text-underline-offset:3px;}
  </style>
</head>

<body>
  <main class="scene" id="scene">
    <a class="brand" href="./index.html" aria-label="Go to home">
      <img src="./assets/logo-white.jpg" alt="Nighthawks logo">
    </a>

    <section class="panel" aria-labelledby="title">
      <div class="kicker">The Circle — Access</div>
      <h1 id="title">Inner Circle — Access</h1>

      <form id="invite-form" novalidate>
        <div class="form-row">
          <label for="code">Invite code</label>
          <div class="input-wrap">
            <input
              id="code" name="code" class="input" type="text"
              inputmode="numeric" autocomplete="one-time-code"
              placeholder="35296907" maxlength="8" pattern="[0-9]{8}"
              aria-describedby="code-hint code-error" required
            />
            <button class="btn" type="submit" id="continue-btn">Continue</button>
          </div>
          <p class="hint" id="code-hint">Enter your 8-digit membership code from the Inner Circle invitation.</p>
          <p class="error" id="code-error" role="alert">Please enter a valid 8-digit code.</p>
        </div>

        <div class="links" aria-label="Auxiliary links">
          <a href="./contact.html">Need help?</a>
          <a href="./apply.html">Apply for membership</a>
        </div>

        <p class="foot">© <span id="year"></span> Nighthawks Concierge</p>
      </form>
    </section>

    <div class="vignette" aria-hidden="true"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPA_URL = "https://iyhoqnxhfvphuufuekfc.supabase.co";
    const SUPA_KEY = "sb_publishable_9bAHUIAzGbtBRE4cevJVtQ_uWuY07e6";
    const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

    const NEXT_PAGE = "./RSVP-form.html";
    const STORAGE_KEY = "nh_ic_member_code_v1";

    (function(){
      const scene = document.getElementById("scene");
      const testImg = new Image();
      testImg.onload = () => scene.classList.add("has-image");
      testImg.src = "./assets/invite-book.jpg";
    })();

    (function(){
      const form = document.getElementById("invite-form");
      const codeEl = document.getElementById("code");
      const errorEl = document.getElementById("code-error");
      const btn = document.getElementById("continue-btn");
      document.getElementById("year").textContent = new Date().getFullYear();

      function setError(msg){
        errorEl.textContent = msg || "Please enter a valid 8-digit code.";
        errorEl.style.display = "block";
        codeEl.classList.add("is-invalid");
        codeEl.setAttribute("aria-invalid", "true");
      }
      function clearError(){
        errorEl.style.display = "none";
        codeEl.classList.remove("is-invalid");
        codeEl.removeAttribute("aria-invalid");
      }
      function normalize(raw){
        return String(raw || "").replace(/\D+/g, "").slice(0, 8);
      }

      codeEl.addEventListener("input", () => {
        codeEl.value = normalize(codeEl.value);
        if (codeEl.value.length === 8) clearError();
      });

      const seeded = new URLSearchParams(location.search).get("code");
      if (seeded) codeEl.value = normalize(seeded);

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearError();

        const code = normalize(codeEl.value);
        if (!/^\d{8}$/.test(code)) {
          setError("Please enter your 8-digit code (numbers only).");
          codeEl.focus();
          return;
        }

        btn.disabled = true;
        btn.textContent = "Checking…";

        const { data, error } = await sb
          .from("invite_codes")
          .select("id, used_count, max_uses, active")
          .eq("code", code)
          .single();

        if (error || !data || !data.active || data.used_count >= data.max_uses) {
          btn.disabled = false;
          btn.textContent = "Continue";
          setError("That code isn't valid. Please check your invitation.");
          codeEl.focus();
          return;
        }

        try { localStorage.setItem(STORAGE_KEY, code); } catch (_) {}
        window.location.href = `${NEXT_PAGE}?code=${encodeURIComponent(code)}`;
      });
    })();
  </script>
</body>
</html>
