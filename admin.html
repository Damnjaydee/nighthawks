<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin — Inner Circle</title>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="color-scheme" content="dark"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root{
      --bg:#0b0b0b; --ink:#e8e4dc; --muted:rgba(232,228,220,.58);
      --line:rgba(255,255,255,.1); --gold:#c5a264;
      --serif:"Cormorant Garamond",serif;
      --sans:"Inter",system-ui,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}

    /* LOGIN */
    .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px;}
    .login-card{
      width:min(420px,96vw);
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:18px;
      padding:32px;
    }
    .login-card h1{font-family:var(--serif);font-size:28px;margin:0 0 6px;font-weight:500;}
    .login-card p{color:var(--muted);font-size:13px;margin:0 0 24px;}
    .field{display:grid;gap:6px;margin-bottom:16px;}
    .field label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
    .field input{
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      color:var(--ink);
      font:400 14px/1 var(--sans);
      outline:none;
      transition:border-color .15s;
    }
    .field input:focus{border-color:rgba(232,228,220,.4);}
    .login-btn{
      width:100%;height:44px;
      background:var(--ink);color:#0b0b0b;
      border:none;border-radius:999px;
      font:600 13px/1 var(--sans);
      letter-spacing:.06em;text-transform:uppercase;
      cursor:pointer;margin-top:8px;
      transition:filter .15s;
    }
    .login-btn:hover{filter:brightness(.94);}
    .login-err{color:#ff6b6b;font-size:12px;margin-top:10px;display:none;text-align:center;}

    /* ADMIN DASHBOARD */
    .dashboard{display:none;padding:32px 24px;max-width:1100px;margin:0 auto;}
    .dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--line);}
    .dash-header h1{font-family:var(--serif);font-size:32px;margin:0;font-weight:500;}
    .dash-header small{color:var(--muted);font-size:12px;}
    .logout-btn{background:transparent;border:1px solid var(--line);color:var(--muted);padding:8px 16px;border-radius:999px;font:500 12px/1 var(--sans);cursor:pointer;letter-spacing:.06em;text-transform:uppercase;}
    .logout-btn:hover{border-color:rgba(232,228,220,.4);color:var(--ink);}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:32px;}
    .stat{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:14px;
      padding:18px 20px;
    }
    .stat-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:0 0 8px;}
    .stat-value{font-family:var(--serif);font-size:36px;font-weight:500;margin:0;line-height:1;}
    .stat-value.good{color:#6fdc8c;}
    .stat-value.warn{color:#f0a500;}
    .stat-value.full{color:#ff6b6b;}

    /* TABLE */
    .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead th{
      padding:12px 16px;
      text-align:left;
      font-size:10px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--muted);
      border-bottom:1px solid var(--line);
      white-space:nowrap;
      background:rgba(255,255,255,.02);
    }
    tbody tr{border-bottom:1px solid rgba(255,255,255,.05);}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:rgba(255,255,255,.02);}
    tbody td{padding:12px 16px;color:var(--ink);vertical-align:top;}
    .badge{
      display:inline-block;
      padding:3px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:500;
    }
    .badge-yes{background:rgba(111,220,140,.12);color:#6fdc8c;border:1px solid rgba(111,220,140,.2);}
    .badge-no{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--line);}
    .empty{padding:48px;text-align:center;color:var(--muted);font-size:14px;}

    /* LOADING */
    .loading{text-align:center;padding:48px;color:var(--muted);font-size:14px;}

    /* EXPORT BTN */
    .export-btn{
      background:transparent;
      border:1px solid var(--line);
      color:var(--muted);
      padding:8px 16px;
      border-radius:999px;
      font:500 12px/1 var(--sans);
      cursor:pointer;
      letter-spacing:.06em;
      text-transform:uppercase;
      margin-left:10px;
    }
    .export-btn:hover{border-color:rgba(232,228,220,.4);color:var(--ink);}

    @media(max-width:600px){
      .dashboard{padding:16px;}
      .dash-header{flex-direction:column;align-items:flex-start;gap:12px;}
    }
  </style>
</head>

<body>

  <!-- LOGIN SCREEN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <h1>Admin Access</h1>
      <p>Inner Circle guest management</p>
      <div class="field">
        <label for="adminPass">Password</label>
        <input id="adminPass" type="password" placeholder="Enter admin password" />
      </div>
      <button class="login-btn" id="loginBtn">Enter</button>
      <div class="login-err" id="loginErr">Incorrect password.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <div>
        <h1>Inner Circle — Guest List</h1>
        <small id="lastUpdated">Loading...</small>
      </div>
      <div>
        <button class="export-btn" id="exportBtn">Export CSV</button>
        <button class="logout-btn" id="logoutBtn">Log out</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <p class="stat-label">Total RSVPs</p>
        <p class="stat-value" id="statRsvps">—</p>
      </div>
      <div class="stat">
        <p class="stat-label">Seats booked</p>
        <p class="stat-value" id="statSeats">—</p>
      </div>
      <div class="stat">
        <p class="stat-label">Seats remaining</p>
        <p class="stat-value" id="statRemaining">—</p>
      </div>
      <div class="stat">
        <p class="stat-label">Plus ones</p>
        <p class="stat-value" id="statPlusOnes">—</p>
      </div>
    </div>

    <!-- Guest table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Plus One</th>
            <th>Guest Name</th>
            <th>Dietary Notes</th>
            <th>Invite Code</th>
            <th>RSVP'd</th>
          </tr>
        </thead>
        <tbody id="guestList">
          <tr><td colspan="9" class="loading">Loading guest list...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPA_URL = "https://iyhoqnxhfvphuufuekfc.supabase.co";
    const SUPA_KEY = "sb_publishable_9bAHUIAzGbtBRE4cevJVtQ_uWuY07e6";
    const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

    const GUEST_CAP = 20;

    // ⚠️ REPLACE THIS WITH YOUR OWN PASSWORD — do not share this file publicly
    const ADMIN_PASSWORD = "REPLACE_WITH_YOUR_PASSWORD";

    const loginWrap = document.getElementById("loginWrap");
    const dashboard = document.getElementById("dashboard");
    const loginErr = document.getElementById("loginErr");
    const adminPass = document.getElementById("adminPass");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const exportBtn = document.getElementById("exportBtn");
    const guestList = document.getElementById("guestList");

    let allRsvps = [];

    // Check session
    if (sessionStorage.getItem("nh_admin_v1") === "true") showDashboard();

    loginBtn.addEventListener("click", () => {
      if (adminPass.value === Team10USA11071991) {
        sessionStorage.setItem("nh_admin_v1", "true");
        loginErr.style.display = "none";
        showDashboard();
      } else {
        loginErr.style.display = "block";
        adminPass.value = "";
        adminPass.focus();
      }
    });

    adminPass.addEventListener("keydown", e => {
      if (e.key === "Enter") loginBtn.click();
    });

    logoutBtn.addEventListener("click", () => {
      sessionStorage.removeItem("nh_admin_v1");
      loginWrap.style.display = "grid";
      dashboard.style.display = "none";
    });

    function showDashboard() {
      loginWrap.style.display = "none";
      dashboard.style.display = "block";
      loadGuests();
    }

    async function loadGuests() {
      const { data, error } = await sb
        .from("rsvps")
        .select("*")
        .order("created_at", { ascending: true });

      if (error || !data) {
        guestList.innerHTML = `<tr><td colspan="9" class="empty">Failed to load guests.</td></tr>`;
        return;
      }

      allRsvps = data;

      // Stats
      let seats = 0;
      let plusOnes = 0;
      data.forEach(r => {
        seats += r.plus_one ? 2 : 1;
        if (r.plus_one) plusOnes++;
      });

      const remaining = GUEST_CAP - seats;
      document.getElementById("statRsvps").textContent = data.length;
      document.getElementById("statSeats").textContent = seats;

      const remainEl = document.getElementById("statRemaining");
      remainEl.textContent = remaining;
      remainEl.className = "stat-value " + (remaining <= 0 ? "full" : remaining <= 4 ? "warn" : "good");

      document.getElementById("statPlusOnes").textContent = plusOnes;
      document.getElementById("lastUpdated").textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

      if (data.length === 0) {
        guestList.innerHTML = `<tr><td colspan="9" class="empty">No RSVPs yet.</td></tr>`;
        return;
      }

      guestList.innerHTML = data.map((r, i) => `
        <tr>
          <td style="color:var(--muted)">${i + 1}</td>
          <td><strong>${r.full_name || "—"}</strong></td>
          <td style="color:var(--muted)">${r.email || "—"}</td>
          <td style="color:var(--muted)">${r.phone || "—"}</td>
          <td><span class="badge ${r.plus_one ? 'badge-yes' : 'badge-no'}">${r.plus_one ? "Yes" : "No"}</span></td>
          <td style="color:var(--muted)">${r.guest_name || "—"}</td>
          <td style="color:var(--muted);font-size:12px;">${r.dietary_notes || "—"}</td>
          <td style="color:var(--muted);font-family:monospace;font-size:12px;">${r.invite_code || "—"}</td>
          <td style="color:var(--muted);font-size:12px;">${new Date(r.created_at).toLocaleDateString("en-US", {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"})}</td>
        </tr>
      `).join("");
    }

    // Export to CSV
    exportBtn.addEventListener("click", () => {
      if (!allRsvps.length) return;
      const headers = ["#","Name","Email","Phone","Plus One","Guest Name","Dietary Notes","Invite Code","RSVP Date"];
      const rows = allRsvps.map((r, i) => [
        i + 1,
        r.full_name || "",
        r.email || "",
        r.phone || "",
        r.plus_one ? "Yes" : "No",
        r.guest_name || "",
        r.dietary_notes || "",
        r.invite_code || "",
        new Date(r.created_at).toLocaleDateString()
      ]);
      const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `inner-circle-guests-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    });
  </script>
</body>
</html>
